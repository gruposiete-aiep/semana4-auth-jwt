<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIEP - Iniciar Sesión</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #1a2b5e;
            padding: 14px 40px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo-box {
            background-color: #cc0000;
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 4px;
            letter-spacing: 1px;
        }
        .logo-sub {
            color: #ffffff;
            font-size: 12px;
            opacity: 0.8;
        }
        nav {
            background-color: #cc0000;
            padding: 10px 40px;
        }
        nav span {
            color: white;
            font-size: 13px;
            opacity: 0.9;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border-top: 4px solid #cc0000;
        }
        .card h1 {
            color: #1a2b5e;
            font-size: 22px;
            margin-bottom: 6px;
        }
        .card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #1a2b5e;
            font-weight: bold;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 18px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus {
            border-color: #1a2b5e;
        }
        button {
            width: 100%;
            background-color: #cc0000;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #aa0000;
        }
        .error {
            background-color: #fff0f0;
            border: 1px solid #ffcccc;
            color: #aa0000;
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        footer {
            background-color: #1a2b5e;
            color: rgba(255,255,255,0.6);
            text-align: center;
            padding: 14px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-box">AIEP</div>
    <div class="logo-sub">de la Universidad Andrés Bello</div>
</header>

<nav>
    <span>Taller de Plataformas Web — Programación Segura</span>
</nav>

<main>
    <div class="card">
        <h1>Iniciar Sesión</h1>
        <p>Ingresa tus credenciales para acceder al sistema</p>

        <div class="error" id="error">
            Credenciales incorrectas. Por favor, verifica tus datos.
        </div>

        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" placeholder="Ingresa tu usuario" />

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Ingresa tu contraseña" />

        <button onclick="login()">Ingresar</button>
    </div>
</main>

<footer>
    &copy; 2025 AIEP — Universidad Andrés Bello. Todos los derechos reservados.
</footer>

<script>
    async function login() {
        const usuario = document.getElementById('usuario').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error');

        errorDiv.style.display = 'none';

        if (!usuario || !password) {
            errorDiv.textContent = 'Por favor completa todos los campos.';
            errorDiv.style.display = 'block';
            return;
        }

        try {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario, password })
            });

            if (response.ok) {
                window.location.href = '/bienvenida.html';
            } else {
                errorDiv.textContent = 'Acceso denegado. Verifica tus credenciales.';
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.textContent = 'Error de conexión. Intenta nuevamente.';
            errorDiv.style.display = 'block';
        }
    }

    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
    });
</script>

</body>
</html>
